<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD to Slack</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f9; color: #333; }
        .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        textarea { width: 100%; min-height: 180px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; line-height: 1.5; box-sizing: border-box; resize: vertical; }
        button { padding: 15px; border: none; border-radius: 8px; background: #4A154B; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        button:active { background: #611f62; transform: scale(0.98); }
        .status { text-align: center; color: #666; font-size: 14px; height: 1.5em; }
        .debug-block { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
        .debug-label { font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h3>Markdown → Slack 変換</h3>
    <button onclick="handleConvertFromClipboard()">クリップボードを変換してコピー！</button>
    <div id="status" class="status"></div>

    <div class="debug-block">
        <div class="debug-label">デバッグ用（手動ペースト）</div>
        <textarea id="debugInput" placeholder="ここにMarkdownを貼り付け"></textarea>
        <button onclick="handleConvertFromTextarea()">下のテキストを変換してコピー！</button>
        <div id="debugStatus" class="status"></div>
    </div>
</div>

<script>

// --- あなたのn8nロジックを移植 ---
function markdownToSlack(md) {
    if (!md) return "";
    let text = md;
    const tokens = {};
    let tokId = 0;

    const save = (payload, kind) => {
        const t = `@@${kind}${tokId++}@@`;
        tokens[t] = payload;
        return t;
    };

    // 正規表現の定義（n8n環境に合わせる）
    const CODE_BLOCK_RE = /```(\w+)?\n([\s\S]+?)\n```/g;
    const INLINE_CODE_RE = /`([^`]+)`/g;
    const HR_RE = /^---$|^===$|^\*\*\*$/gm;
    const MD_IMAGE_RE = /!\[(.*?)\]\((.*?)\)/g;
    const MD_LINK_RE = /\[(.*?)\]\((.*?)\)/g;

    text = text.replace(CODE_BLOCK_RE, (_, lang, code) => save("```" + code + "```", "BLOCK"));
    text = text.replace(INLINE_CODE_RE, (_, code) => save("`" + code + "`", "INLINE"));

    const dispWidth = (str) => {
        let w = 0;
        for (const ch of str) {
            const cp = ch.codePointAt(0);
            if (cp >= 0x1100 && (
                cp <= 0x115f || cp === 0x2329 || cp === 0x232a ||
                (cp >= 0x2e80 && cp <= 0xa4cf && cp !== 0x303f) ||
                (cp >= 0xac00 && cp <= 0xd7a3) ||
                (cp >= 0xf900 && cp <= 0xfaff) ||
                (cp >= 0xfe10 && cp <= 0xfe6f) ||
                (cp >= 0xff01 && cp <= 0xff60) ||
                (cp >= 0xffe0 && cp <= 0xffe6) ||
                (cp >= 0x20000 && cp <= 0x2fffd) ||
                (cp >= 0x30000 && cp <= 0x3fffd)
            )) { w += 1.7; } else { w += 1; }
        }
        return w;
    };
    const padEndW = (str, width) => str + " ".repeat(Math.max(0, width - dispWidth(str)));

    const TABLE_RE = /((?:^\|.+\|\s*\n)+)/gm;
    text = text.replace(TABLE_RE, (block) => {
        const rows = block.trim().split("\n").filter(r => !/^\|\s*[-:]+/.test(r));
        const parsed = rows.map(r =>
            r.replace(/^\||\|$/g, "").split("|").map(c => c.replace(/\*\*(.+?)\*\*/g, "$1").trim())
        );
        const cols = parsed[0] ? parsed[0].length : 0;
        const widths = Array.from({length: cols}, (_, i) =>
            Math.max(...parsed.map(r => dispWidth(r[i] || "")))
        );
        const formatted = parsed.map(r =>
            "| " + r.map((c, i) => padEndW(c || "", widths[i])).join(" | ") + " |"
        );
        return save("```\n" + formatted.join("\n") + "\n```", "TABLE") + "\n";
    });

    text = text
        .replace(/^####\s+(.+)$/gm, (_, h) => `*【${h.trim()}】*`)
        .replace(/^###\s+(.+)$/gm,  (_, h) => `*【${h.trim()}】*`)
        .replace(/^##\s+(.+)$/gm,   (_, h) => `*【${h.trim()}】*`)
        .replace(/^#\s+(.+)$/gm,    (_, h) => `*【${h.trim()}】*`);

    text = text.replace(/^ {4}[-*+]\s+/gm, "    ◦ ");
    text = text.replace(/^ {2}[-*+]\s+/gm, "  ◦ ");
    text = text.replace(/^[-*+]\s+/gm, "• ");

    const JP_ALNUM = /[\u3040-\u30ff\u3400-\u9fffA-Za-z0-9]/;
    text = text.replace(/\*\*(.+?)\*\*|__(.+?)__/g, (m, g1, g2, offset, src) => {
        const inner = (g1 || g2).trim();
        const before = offset > 0 ? src.charAt(offset - 1) : "";
        const after = src.charAt(offset + m.length);
        const pre = (before && before !== " " && before !== "\n" && JP_ALNUM.test(before)) ? " " : "";
        const post = (JP_ALNUM.test(after)) ? " " : "";
        return pre + `*${inner}*` + post;
    });
    text = text.replace(/~~(.+?)~~/g, (_, s) => `~${s}~`);
    text = text.replace(HR_RE, "────────");
    text = text.replace(MD_IMAGE_RE, (_, alt, url) => `<${url}|${alt || "image"}>`);
    text = text.replace(MD_LINK_RE,  (_, label, url) => `<${url}|${label}>`);
    text = text.replace(/\n{3,}/g, "\n\n").trim();

    for (const [t, payload] of Object.entries(tokens)) {
        text = text.split(t).join(payload);
    }
    return text;
}

async function handleConvertFromClipboard() {
    const status = document.getElementById('status');

    try {
        const raw = await navigator.clipboard.readText();
        if (!raw) {
            status.innerText = "❌ クリップボードが空です";
            setTimeout(() => { status.innerText = ""; }, 2000);
            return;
        }
        const converted = markdownToSlack(raw);
        await navigator.clipboard.writeText(converted);
        status.innerText = "✅ 変換＆コピー完了！";
        setTimeout(() => { status.innerText = ""; }, 2000);
    } catch (err) {
        status.innerText = "❌ クリップボードにアクセスできません";
    }
}

async function handleConvertFromTextarea() {
    const input = document.getElementById('debugInput');
    const status = document.getElementById('debugStatus');
    const raw = input.value;

    if (!raw) {
        status.innerText = "❌ テキストエリアが空です";
        setTimeout(() => { status.innerText = ""; }, 2000);
        return;
    }

    const converted = markdownToSlack(raw);
    input.value = converted;

    try {
        await navigator.clipboard.writeText(converted);
        status.innerText = "✅ 変換＆コピー完了！";
        setTimeout(() => { status.innerText = ""; }, 2000);
    } catch (err) {
        status.innerText = "⚠️ 変換は完了（コピー失敗）";
    }
}
</script>
</body>
</html>
